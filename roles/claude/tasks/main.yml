---
- name: Ensure ~/.claude exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude"
    state: directory
    mode: "0755"

- name: Create symbolic link for config
  ansible.builtin.file:
    src: "{{ role_path }}/files/settings.json"
    dest: "{{ ansible_env.HOME }}/.claude/settings.json"
    state: link
